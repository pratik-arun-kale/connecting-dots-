<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <title>Context Workspace</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    /* ── TOKENS ──────────────────────────────────────────────── */
    :root {
      --black:   #1a1a1a;
      --white:   #ffffff;
      --surface: #f5f5f5;
      --border:  #e5e5e5;
      --muted:   #6b6b6b;
      --danger:  #dc2626;
      --success: #16a34a;

      --chatgpt-fg: #065f46; --chatgpt-bg: #d1fae5;
      --claude-fg:  #5b21b6; --claude-bg:  #ede9fe;
      --gemini-fg:  #1e40af; --gemini-bg:  #dbeafe;

      --r-btn:  8px;
      --r-card: 12px;
      --r-pill: 20px;
      --font: system-ui, -apple-system, sans-serif;
    }

    /* ── RESETS ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: var(--font); cursor: pointer; border: none; }
    input  { font-family: var(--font); }

    /* ── BASE ────────────────────────────────────────────────── */
    body {
      width: 360px;
      background: var(--white);
      color: var(--black);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      width: 20px; height: 20px;
      border-radius: 5px;
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon .ti { font-size: 11px; color: var(--white); line-height: 1; }
    .header-title {
      flex: 1;
      font-size: 13px; font-weight: 600;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.online  { background: #22c55e; }
    .status-dot.offline { background: var(--danger); }

    /* ── OFFLINE BANNER ──────────────────────────────────────── */
    .offline-banner {
      background: #fef2f2;
      border-bottom: 1px solid #fecaca;
      padding: 7px 16px;
      font-size: 11px;
      color: var(--danger);
      display: flex; align-items: center; gap: 5px;
    }
    .offline-banner .ti { font-size: 13px; }

    /* ── TAB BAR ─────────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 9px 0 8px;
      font-size: 12px; font-weight: 500;
      color: var(--muted); background: none;
      border: none; border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .tab-btn.active   { color: var(--black); border-bottom-color: var(--black); }
    .tab-btn:hover:not(.active) { color: var(--black); }

    /* ── TAB PANEL ───────────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .tab-scroll {
      height: 372px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── DETECT BANNER ───────────────────────────────────────── */
    .detect-wrap { padding: 12px 16px 8px; }

    .detect-empty {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 11px 12px;
      background: var(--surface);
      border-radius: var(--r-card);
      border: 1px solid var(--border);
      font-size: 12px; color: var(--muted); line-height: 1.45;
    }
    .detect-empty .ti { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

    .detect-card {
      padding: 11px 12px;
      border-radius: var(--r-card);
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .detect-card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 5px;
    }
    .detect-badge-row { display: flex; align-items: center; gap: 6px; }
    .detected-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--success);
    }
    .detect-title {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detect-url {
      font-size: 10px; color: var(--muted); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── PLATFORM BADGE ──────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      letter-spacing: 0.01em;
    }
    .badge-chatgpt { background: var(--chatgpt-bg); color: var(--chatgpt-fg); }
    .badge-claude  { background: var(--claude-bg);  color: var(--claude-fg); }
    .badge-gemini  { background: var(--gemini-bg);  color: var(--gemini-fg); }
    .badge-unknown { background: var(--surface); color: var(--muted); }

    /* ── CAPTURE BUTTON ──────────────────────────────────────── */
    .capture-wrap { padding: 0 16px 12px; }
    .capture-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 11px 14px;
      background: var(--black); color: var(--white);
      border-radius: var(--r-btn);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .capture-btn:not(:disabled):hover { opacity: 0.86; }
    .capture-btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .capture-btn.success { background: #15803d; }
    .capture-btn.error   { background: var(--danger); }
    .shortcut {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.12);
      border-radius: 4px; padding: 2px 6px;
      letter-spacing: 0.02em; flex-shrink: 0; white-space: nowrap;
    }

    /* ── SAVE-TO-PROJECT SECTION ─────────────────────────────── */
    .save-section { padding: 0 16px 4px; }
    .save-label {
      font-size: 11px; font-weight: 600;
      color: var(--muted); margin-bottom: 7px;
    }
    .pills-scroll {
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none;
      padding-bottom: 1px;
    }
    .pills-scroll::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 4px 13px; border-radius: var(--r-pill);
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--black);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.1s, background 0.1s, color 0.1s;
    }
    .pill:hover:not(.selected) { border-color: var(--black); }
    .pill.selected { background: var(--black); color: var(--white); border-color: var(--black); }

    /* ── INLINE NEW PROJECT FORM ─────────────────────────────── */
    .text-link {
      background: none; border: none; cursor: pointer;
      font-size: 12px; color: var(--muted);
      padding: 6px 0 2px; display: inline-block;
      transition: color 0.1s;
    }
    .text-link:hover { color: var(--black); }

    .inline-form {
      display: flex; gap: 6px; align-items: center;
      padding: 6px 0 8px;
    }
    .inline-form.hidden { display: none; }
    .inline-input {
      flex: 1; height: 30px; padding: 0 9px;
      border: 1px solid var(--border); border-radius: var(--r-btn);
      font-size: 12px; background: var(--white); color: var(--black);
      outline: none;
      transition: border-color 0.1s;
    }
    .inline-input:focus { border-color: var(--black); }
    .btn-sm {
      height: 30px; padding: 0 12px; border-radius: var(--r-btn);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: opacity 0.1s; border: 1px solid;
      white-space: nowrap;
    }
    .btn-sm-primary { background: var(--black); color: var(--white); border-color: var(--black); }
    .btn-sm-ghost   { background: none; color: var(--muted); border-color: var(--border); }
    .btn-sm:hover { opacity: 0.75; }

    /* ── SECTION HEADER ──────────────────────────────────────── */
    .section-hd {
      padding: 12px 16px 6px;
      font-size: 11px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── CONTEXT CARD ────────────────────────────────────────── */
    .ctx-card {
      margin: 0 16px 6px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
    }
    .ctx-card:last-child { margin-bottom: 12px; }
    .ctx-card:hover { border-color: var(--black); background: var(--surface); }
    .ctx-card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .ctx-title {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0; margin: 0 6px 0 0;
    }
    .ctx-time {
      font-size: 10px; color: var(--muted); flex-shrink: 0; white-space: nowrap;
    }
    .ctx-preview {
      font-size: 11px; color: var(--muted); line-height: 1.4;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .ctx-project-tag {
      display: inline-block;
      font-size: 10px; color: var(--muted);
      margin-top: 4px;
    }

    /* ── EMPTY / LOADING ─────────────────────────────────────── */
    .empty-row {
      padding: 28px 16px;
      text-align: center; color: var(--muted); font-size: 12px; line-height: 1.55;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .empty-row .ti { font-size: 24px; color: var(--border); }
    .loading-row {
      padding: 24px 16px;
      text-align: center; color: var(--muted); font-size: 12px;
    }
    .skel {
      height: 13px; border-radius: 4px; background: var(--surface);
      margin: 0 16px 6px;
    }
    .skel-card {
      height: 72px; border-radius: var(--r-card); background: var(--surface);
      margin: 0 16px 6px;
    }

    /* ── PROJECTS TAB ────────────────────────────────────────── */
    .tab-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 6px;
      border-bottom: 1px solid var(--surface);
    }
    .toolbar-title { font-size: 12px; font-weight: 600; color: var(--muted); }
    .inline-form-padded { padding: 8px 16px; border-bottom: 1px solid var(--border); }

    .proj-row {
      display: flex; align-items: center;
      padding: 11px 16px; gap: 10px;
      border-bottom: 1px solid var(--surface);
      cursor: pointer;
      transition: background 0.1s;
    }
    .proj-row:hover { background: var(--surface); }
    .proj-row:last-child { border-bottom: none; }
    .proj-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; }
    .proj-meta {
      font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0;
    }
    .proj-chev { color: var(--border); flex-shrink: 0; }
    .proj-chev .ti { font-size: 14px; }

    /* ── SAVED TAB ───────────────────────────────────────────── */
    .search-wrap {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--white);
      z-index: 1;
    }
    .search-inner {
      position: relative;
      display: flex; align-items: center;
    }
    .search-icon {
      position: absolute; left: 9px;
      font-size: 13px; color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; height: 32px; padding: 0 10px 0 30px;
      border: 1px solid var(--border); border-radius: var(--r-btn);
      font-size: 12px; background: var(--surface); color: var(--black);
      outline: none;
      transition: background 0.1s, border-color 0.1s;
    }
    .search-input:focus { background: var(--white); border-color: var(--black); }

    .date-group { margin-top: 4px; }
    .date-label {
      padding: 8px 16px 3px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── FOOTER ──────────────────────────────────────────────── */
    .footer {
      display: flex; align-items: center;
      height: 46px;
      border-top: 1px solid var(--border);
    }
    .footer-btn {
      flex: 1; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px;
      transition: color 0.1s, background 0.1s;
    }
    .footer-btn:hover { color: var(--black); background: var(--surface); }
    .footer-btn.active { color: var(--black); }
    .footer-sep {
      width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-icon" aria-hidden="true">
      <i class="ti ti-layers-subtract"></i>
    </div>
    <span class="header-title">Context Workspace</span>
    <div class="status-dot" id="statusDot" title="Backend status"></div>
  </header>

  <!-- ── OFFLINE BANNER ─────────────────────────────────────── -->
  <div class="offline-banner" id="offlineBanner" hidden>
    <i class="ti ti-wifi-off"></i>
    Backend offline — capture disabled
  </div>

  <!-- ── TAB BAR ────────────────────────────────────────────── -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="capture"   role="tab" aria-selected="true">Capture</button>
    <button class="tab-btn"        data-tab="projects"  role="tab">Projects</button>
    <button class="tab-btn"        data-tab="saved"     role="tab">Saved</button>
  </nav>

  <!-- ── TAB CONTENT ────────────────────────────────────────── -->

  <!-- TAB 1: CAPTURE -->
  <section id="tab-capture" class="tab-panel active" role="tabpanel">
    <div class="tab-scroll" id="capture-scroll">

      <!-- Detection banner -->
      <div class="detect-wrap" id="detect-wrap">
        <div class="detect-empty" id="detect-empty">
          <i class="ti ti-cursor-off"></i>
          Open a ChatGPT, Claude, or Gemini conversation to capture
        </div>
        <div class="detect-card" id="detect-card" hidden>
          <div class="detect-card-top">
            <div class="detect-badge-row">
              <span class="badge" id="detect-badge">ChatGPT</span>
            </div>
            <span class="detected-label">Detected</span>
          </div>
          <div class="detect-title" id="detect-title">Loading…</div>
          <div class="detect-url"   id="detect-url"></div>
        </div>
      </div>

      <!-- Capture button -->
      <div class="capture-wrap">
        <button class="capture-btn" id="captureBtn" disabled>
          <span id="captureBtnText">Open a ChatGPT, Claude, or Gemini conversation</span>
          <span class="shortcut" id="captureShortcut">⌘⇧C</span>
        </button>
      </div>

      <!-- Save to project -->
      <div class="save-section">
        <div class="save-label">Save to project</div>
        <div class="pills-scroll" id="pillsScroll">
          <div class="loading-row" style="padding:4px 0; text-align:left; font-size:12px; color:var(--muted)">
            Loading projects…
          </div>
        </div>
        <button class="text-link" id="newProjLink">+ New project</button>
        <div class="inline-form hidden" id="inlineForm1">
          <input type="text" class="inline-input" id="newProjInput1"
            placeholder="Project name" maxlength="80" autocomplete="off">
          <button class="btn-sm btn-sm-primary" id="newProjConfirm1">Create</button>
          <button class="btn-sm btn-sm-ghost"   id="newProjCancel1">Cancel</button>
        </div>
      </div>

      <!-- Recent captures -->
      <div class="section-hd">Recent captures</div>
      <div id="recentCaptures">
        <div class="skel-card"></div>
        <div class="skel-card" style="height:60px"></div>
      </div>

    </div><!-- /capture-scroll -->
  </section>

  <!-- TAB 2: PROJECTS -->
  <section id="tab-projects" class="tab-panel" role="tabpanel">
    <div class="tab-toolbar">
      <span class="toolbar-title">All projects</span>
      <button class="text-link" id="newProjBtn2" style="padding:0">+ New project</button>
    </div>
    <div class="inline-form hidden inline-form-padded" id="inlineForm2">
      <input type="text" class="inline-input" id="newProjInput2"
        placeholder="Project name" maxlength="80" autocomplete="off">
      <button class="btn-sm btn-sm-primary" id="newProjConfirm2">Create</button>
      <button class="btn-sm btn-sm-ghost"   id="newProjCancel2">Cancel</button>
    </div>
    <div class="tab-scroll" id="projectListWrap">
      <div class="loading-row">Loading projects…</div>
    </div>
  </section>

  <!-- TAB 3: SAVED -->
  <section id="tab-saved" class="tab-panel" role="tabpanel">
    <div class="search-wrap">
      <div class="search-inner">
        <i class="ti ti-search search-icon"></i>
        <input type="text" class="search-input" id="searchInput"
          placeholder="Search captures…" autocomplete="off">
      </div>
    </div>
    <div class="tab-scroll" id="savedListWrap" style="height:326px">
      <div class="loading-row">Loading…</div>
    </div>
  </section>

  <!-- ── FOOTER ─────────────────────────────────────────────── -->
  <footer class="footer">
    <button class="footer-btn" id="footerDashboard" title="Dashboard">
      <i class="ti ti-layout-dashboard"></i>
    </button>
    <div class="footer-sep"></div>
    <button class="footer-btn" id="footerSearch" title="Search captures">
      <i class="ti ti-search"></i>
    </button>
    <div class="footer-sep"></div>
    <button class="footer-btn" id="footerSettings" title="Settings">
      <i class="ti ti-settings"></i>
    </button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
