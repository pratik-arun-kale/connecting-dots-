[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = [
    "--tb=short",
    "-q",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008"]   # do not perform function calls in argument defaults (FastAPI Depends)
